[package]
name = "cosmon-runtime"
publish.workspace = true
version = "0.1.0"
edition = "2021"
rust-version.workspace = true
license.workspace = true
description = "Resident runtime skeleton for Cosmon (ADR-016 Phase 3)"

[dependencies]
blake3.workspace = true
chrono.workspace = true
cosmon-core.workspace = true
cosmon-filestore.workspace = true
cosmon-graph.workspace = true
cosmon-hash.workspace = true
cosmon-process-witness.workspace = true
cosmon-state.workspace = true
notify.workspace = true
rand.workspace = true
serde = { workspace = true }
serde_json.workspace = true
thiserror.workspace = true

[dev-dependencies]
# `test-harness` exposes cosmon_core::harness (mock CommandRunner / Clock) for
# the hermetic scenario tests (e.g. diamond_mock.rs). Off in normal builds.
cosmon-core = { workspace = true, features = ["test-harness"] }
chrono.workspace = true
proptest.workspace = true
serde_json.workspace = true
tempfile.workspace = true

[lints]
workspace = true
