\* Governance-gate fixture (delib-20260516-5d97 Step 4 enfant #4).
\* Verifies GovernanceGateRespected on a small in-band model :
\*   * Two molecules : m_g (governance-relevant) and m_o (ordinary).
\*   * FederationAdmitted = {m_g} -- the oracle admits the relevant one.
\*   * No async crashes, no out-of-band merge -- closed environment.
\*
\* Expected : no error, GovernanceGateRespected holds for every reachable
\* state.  CompleteGoverned fires for m_o without consulting the oracle ;
\* fires for m_g only because m_g \in FederationAdmitted.
SPECIFICATION SpecGoverned
CHECK_DEADLOCK FALSE
CONSTANTS
    Mol = {m_g, m_o}
    MaxSeqno = 1
    AsyncCrashesEnabled = FALSE
    OutOfBandEnabled    = FALSE
    T_STALL  = 99
    MaxClock = 1
    GovernanceRelevant = {m_g}
    FederationAdmitted = {m_g}
    Verticals = {v_alpha}
    Attestors = {att_1, att_2, att_3}
    Clusters  = {c_1, c_2, c_3}
    k_gate     = 2
    N_gate     = 3
    W_max_gate = 1
INVARIANTS
    TypeOK
    I3_FleetMirrorsSession
    I4_SessionImpliesLiveProcess
    I6_NoGhostFleetEntry
    I7_SingleEventWriter
    I9_BranchMergedOnlyIfCompleted
    GovernanceGateRespected
PROPERTIES
    L3_LockEventuallyReleased
