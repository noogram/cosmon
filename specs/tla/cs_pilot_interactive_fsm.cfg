\* TLC model — interactive harness FSM for cs pilot (ADR-115).
\*
\* Launch (tla2tools.jar ships in docs/specs/ — referenced, not duplicated):
\*   JAVA=/opt/homebrew/opt/openjdk@17/bin/java   # any Java 11+
\*   $JAVA -XX:+UseParallelGC -cp ../../docs/specs/tla2tools.jar tlc2.TLC \
\*       -workers auto -config cs_pilot_interactive_fsm.cfg \
\*       cs_pilot_interactive_fsm.tla
\*
\* Note: snake_case, not the kebab `cs-pilot-interactive-fsm` of the task
\* brief — TLA+ module names forbid hyphens and TLC enforces filename ==
\* module name. Forced kebab->snake rename (cf. the repo's KebabRenameBait).
\*
\* Expected verdict: "Model checking completed. No error has been found."
\*
\* AllowSilentTerminate = FALSE — the shipped model. Flip it to TRUE to make
\* TLC exhibit the InteractiveStopYields counterexample (proof the invariant
\* is load-bearing, not vacuous).
\*
\* CHECK_DEADLOCK FALSE — `stopped` is the intended terminal absorbing state;
\* no-livelock is checked as the liveness property NoLivelock instead.

SPECIFICATION Spec

CONSTANTS
    MaxTurns             = 3
    MaxOperatorTurns     = 2
    AllowSilentTerminate = FALSE

INVARIANTS
    TypeOK
    InteractiveStopYields
    WorkerPathUnchanged
    TurnBounded
    WorkerNeverQuits

PROPERTIES
    NoLivelock

CHECK_DEADLOCK FALSE
