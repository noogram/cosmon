name: Supply-chain

# cargo-deny + cargo-audit gates. SHA-pinned actions only.
# delib-20260425-39c1 §I.C2 / forgemaster §1: tag-mutable Actions are
# the most immediately exploitable supply-chain vector. Re-pin via
# `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` before bumping.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-run daily so newly-published advisories break the build even if
    # no commit landed that day.
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo deny
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2
        with:
          command: check
          arguments: --all-features

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: audit
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit --deny warnings

  license-gate:
    # Open-core license coherence (delib-20260620-ca76 + ADR-092).
    # Three fail-closed checks, in cheapest-first order:
    #   1. cargo deny check licenses — every crate's license is on the
    #      allow-list (AGPL-3.0-only / Apache-2.0 / permissive third-party).
    #      Catches a future crate inventing a third license, or a
    #      transitive dep pulling an un-allowed license into the closure.
    #   2. license-table.sh --check — the per-crate partition (core=AGPL /
    #      frontier=Apache) matches scripts/license-rationales.tsv and the
    #      rendered block in docs/license/INDEX.md. Catches a new crate
    #      added without curating its placement.
    #   3. license-network-boundary.py — the network-boundary doctrine:
    #      no Apache-2.0 first-party crate code-links an AGPL-3.0-only
    #      first-party crate through NORMAL (non-dev/non-build) deps.
    name: license gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: license-gate
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny
      - name: cargo deny check licenses
        run: cargo deny check licenses
      - name: Per-crate partition coherence
        run: bash scripts/license-table.sh --check
      - name: Network-boundary doctrine (no Apache crate links AGPL)
        run: python3 scripts/license-network-boundary.py
      - name: Per-file SPDX headers present
        run: python3 scripts/spdx-headers.py --check

  cargo-vet:
    # Supply-chain review gate. supply-chain/{config,audits,imports.lock}.toml
    # is committed; mozilla + google audits are imported. Crates not yet
    # certified are listed under [exemptions] in config.toml — `cargo vet`
    # passes today because of those exemptions, and the count drops as
    # crates get manually certified via `cargo vet certify <name> <version>`.
    # Removing an exemption WITHOUT a matching audit will fail this job.
    name: cargo vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          key: vet
      - name: Install cargo-vet
        run: cargo install --locked cargo-vet
      - name: Run cargo vet
        run: cargo vet --locked
