\* TLC model — interactive harness FSM for cs pilot (ADR-115).
\*
\* Launch (tla2tools.jar ships in docs/specs/ — referenced, not duplicated):
\*   JAVA=/opt/homebrew/opt/openjdk@17/bin/java   # any Java 11+
\*   $JAVA -XX:+UseParallelGC -cp ../../docs/specs/tla2tools.jar tlc2.TLC \
\*       -workers auto -config cs_pilot_interactive_fsm.cfg \
\*       cs_pilot_interactive_fsm.tla
\*
\* Note: snake_case, not the kebab `cs-pilot-interactive-fsm` of the task
\* brief — TLA+ module names forbid hyphens and TLC enforces filename ==
\* module name. Forced kebab->snake rename (cf. the repo's KebabRenameBait).
\*
\* ADVERSARIAL config (task-20260724-c014): BoundedNudgeBudget = TRUE models
\* the PRE-FIX confirm loop — a fixed retry window that expires into a warn!
\* and a return, leaving the briefing pasted-but-unsubmitted forever.
\*
\* Expected verdict: FAILURE. TLC must report a NoSilentAbandon violation
\* (and, with invariants disabled, a BriefingResolves temporal violation).
\* A PASS here means the delivery layer has gone vacuous.
\*
\* BoundedNudgeBudget = FALSE — the shipped model: the briefing-submit confirm
\* loop escalates a stuck paste as a typed failure. Flip it to TRUE (see
\* cs_pilot_interactive_fsm_bounded_nudge.cfg) to model the pre-fix
\* bounded-window-then-silent-return and make TLC exhibit the
\* NoSilentAbandon / BriefingResolves counterexample (task-20260724-c014).
\*
\* AllowSilentTerminate = FALSE — the shipped model. Flip it to TRUE to make
\* TLC exhibit the InteractiveStopYields counterexample (proof the invariant
\* is load-bearing, not vacuous).
\*
\* CHECK_DEADLOCK FALSE — `stopped` is the intended terminal absorbing state;
\* no-livelock is checked as the liveness property NoLivelock instead.

SPECIFICATION Spec

CONSTANTS
    MaxTurns             = 3
    MaxOperatorTurns     = 2
    AllowSilentTerminate = FALSE
    MaxNudges            = 2
    BoundedNudgeBudget   = TRUE

INVARIANTS
    TypeOK
    InteractiveStopYields
    WorkerPathUnchanged
    TurnBounded
    WorkerNeverQuits
    NoSilentAbandon
    NoWorkBeforeSubmit
    InteractiveSkipsDelivery

PROPERTIES
    NoLivelock
    BriefingResolves

CHECK_DEADLOCK FALSE
