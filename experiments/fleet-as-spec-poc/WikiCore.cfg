\* Model-check config for WikiCore.tla — small bounded world for TLC.
\*
\* Rationale for sizes:
\*   - 3 primary sources: enough to distinguish "partial" vs "full" ledger
\*     closure, small enough to keep state space tractable.
\*   - 1 reader ("misha"): the ADR-0002 kill-switch expects one active
\*     attestation at a time; more readers would only add symmetry.
\*   - 2 authors + 2 scorers with intersection empty: smallest config that
\*     admits author != scorer (pillar 5).
\*   - MaxArticles = 2: two articles suffice to expose any "second article
\*     drops pillar" bugs without exploding the state space.
\*   - NeologismPool = {"H-PID-2"}: the wiki3 neologism from ADR-0002 §1,
\*     so the model can represent the historical failure and prove it
\*     blocked by pillar 3.

SPECIFICATION Spec

\* Kill-switch and "all-gates-passed-and-promoted" are legitimate terminal
\* states — the pipeline intentionally stops. Disable deadlock detection.
CHECK_DEADLOCK FALSE

CONSTANTS
    PrimarySources = {p1, p2, p3}
    Readers        = {misha}
    Authors        = {a1, a2}
    Scorers        = {s1, s2}
    MaxArticles    = 2
    NeologismPool  = {"H-PID-2"}
    AllGates       = {"ledger-closure", "replay-green", "schema-conform", "promotion-signed"}
    NULL           = NULL

INVARIANT
    TypeOK
    MasterPillars
    SubFleetGates

PROPERTY
    L_KillSwitchSticky

CONSTRAINT
    StateBound
