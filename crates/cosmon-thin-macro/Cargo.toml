[package]
name = "cosmon-thin-macro"
publish.workspace = true
version = "0.1.0"
edition = "2021"
rust-version.workspace = true
# Frontier crate (ADR-092): a third party would `cargo add` this without
# wanting AGPL — keep on Apache-2.0 to preserve permissive boundary.
license = "Apache-2.0"
description = "Proc-macro `#[verb(method, path, principal)]` for cosmon-thin-cli — generates HTTP verb metadata at compile time."

[lib]
proc-macro = true

[dependencies]
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[lints]
workspace = true
