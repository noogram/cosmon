\* Model 1 — In-band cross-galaxy (no peer forgery, no async crashes, no
\* BypassMerge). Expected: all five cross-galaxy invariants I11..I15 hold,
\* plus TypeOK and the four CosmonRun invariants that remain valid when
\* async crashes are disabled. This is the "both kitchens with the doors
\* closed" case.
SPECIFICATION XGalaxySpec
CHECK_DEADLOCK FALSE
CONSTANTS
    Mol                  = {m1}
    Galaxies             = {gA, gB}
    MaxSeqno             = 1
    MaxCrossEdges        = 1
    AsyncCrashesEnabled  = FALSE
    OutOfBandEnabled     = FALSE
    AdversarialPeerForge = FALSE
INVARIANTS
    TypeOK
    XGalaxyTypeOK
    I11_UnionLedger
    I12_SingleWriterPerGalaxyField
    I13_ContentIdentityUnderRename
    I14_PeerCompletionHonest
    I15_CrossGalaxyCostBound
