# cs ↔ cs-thin clap surface allowlist (T-CS-THIN-TEST-COVERAGE-GAP).
# ----------------------------------------------------------------------
# Every divergence between the cs and cs-thin clap surfaces is either
# listed here (with a written reason + ADR ref when applicable) or fails
# `flag_parity::flag_sets_match_modulo_allowlist`. There is no
# "ignore-everything-that-differs" escape hatch.
#
# Sections:
#
#   [[verb_absent_from_thin]]   — cs verb that cs-thin does not model.
#   [[verb_only_in_thin]]       — cs-thin verb that has no cs counterpart.
#   [[flag_only_in_cs]]         — flag present in `cs <verb> --help` but
#                                 absent from `cs-thin <verb> --help`.
#   [[flag_only_in_thin]]       — flag present in cs-thin but absent
#                                 from cs (for the same verb).
#
# `verb = "*"` matches every cs verb (used for global-flag carve-outs
# like `--config`, `--verbose`, `--json`).

# ─────────────────────────────────────────────────────────────────────
# Verbs absent from cs-thin — split between operator-only (ADR-080
# §5.1) and out-of-scope (the §8p subset strict — most cs verbs are
# not RPP-exposable by design).
# ─────────────────────────────────────────────────────────────────────

