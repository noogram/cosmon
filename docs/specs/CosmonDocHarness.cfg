\* TLC model — tight config for CosmonDocHarness: liveness + safety.
\*
\* Launch:
\*   $JAVA -XX:+UseParallelGC -jar tla2tools.jar \
\*       -workers auto -config CosmonDocHarness.cfg CosmonDocHarness.tla
\*
\* Expected verdict: "Model checking completed. No error has been found."
\*
\* No SYMMETRY here — TLC refuses symmetry on stutter-sensitive temporal
\* properties (LyapunovDecreasing is liveness). The widened
\* CosmonDocHarness_Safety.cfg activates symmetry for safety-only stress.

SPECIFICATION Spec

CONSTANTS
    ArtifactIds      = { a1, a2 }
    Adapters         = { ad_legit, ad_bait }
    RegistryAdapters = { ad_legit }
    KebabRenameBait  = { ad_bait }
    Concepts         = { c1 }
    MaxIter          = 6
    MaxArtifacts     = 10
    MaxWordCount     = 20

INVARIANTS
    TypeOK
    NoOrphanDoc
    DemoGateBeforeDoc
    RegistryTruth
    TatouageShape

PROPERTIES
    LyapunovDecreasing

CHECK_DEADLOCK FALSE
