formula = "task-work"
version = 1
description = """
Execute a concrete task.

NOT FOR GALAXY BOOTSTRAP. If the brief is to bootstrap a new galaxy \
(e.g. \"create /srv/cosmon/foo with CLAUDE.md/THESIS/ROADMAP\"), STOP \
and use `cs nucleate galaxy-onboarding` instead. `task-work` is a \
generic formula and produces only what the brief literally names — \
which means `cs init`, git init, and neurion registration get \
silently dropped if the brief doesn't enumerate them. \
`galaxy-onboarding` carries those invariants by construction. \
Reference: chronicle 2026-04-29 \"Le trou doctrinal du brief de \
bootstrap\".

VISUAL DELIVERABLES — if this task emits something a human will LOOK \
at (HTML deck, PDF slides, poster, rendered diagram, printable doc), \
the cargo gates do NOT inspect the rendered page. Compose the \
`visual-qa` gate (G_visual) before completion: render → read the \
pixels → adversarial layout checklist → fail-closed. See \
`.cosmon/formulas/visual-qa.formula.toml`, ADR-120, and \
`docs/guides/visual-qa-gate.md`.

PRODUCER DELIVERABLES — do NOT use this generic formula when the claimed \
deliverable is a runner, pipeline, harness, ingester, or any other program \
whose value is that it produces records. Build it under `producer-work` \
instead. Compilation, lint, and unit tests establish only the scaffold; they \
cannot establish that the production path ran. `producer-work` has a hard \
`smoke-dispatch` step that executes the declared producer path and refuses to \
advance unless that path leaves a non-empty real output artifact. This is the \
distinction between “well formed” and “it produced a thing”.
"""
id_prefix = "task"

# The operator's task statement. Required and default-free: a `task-work`
# molecule with a blank `topic` carries no brief, so `cs nucleate` refuses to
# birth it and `cs tackle` refuses to dispatch it (task-20260711-919a — the
# briefless-molecule guard, corollary of the frontier stuck-frozen fix 9b86).
# The observed pathology was empty-topic molecules dispatched by the runtime
# after a `cs reconcile` cleared `state.json` variables.
[vars.topic]
description = "The concrete task to execute, stated in one or more sentences."
required = true

# Tier 0 — leaf formula, no child nucleation.
[tier]
level = 0

[[steps]]
id = "implement"
title = "Implement the solution"
description = "Do the work. Read the project's CLAUDE.md for conventions."
acceptance = "Implementation complete, compiles clean"

[[steps]]
id = "verify"
title = "Verify and validate"
description = """
Run all gates: build, test, lint, format, doc. Fix any issues.

The doc gate is the one no other gate subsumes: `cargo check` compiles \
code without resolving a single doc link, and clippy is not rustdoc. A \
broken intra-doc link therefore compiles, lints, and tests green, and is \
caught only by CI on main — after the merge, when you are gone. Run it \
before claiming done.

RESULT CONTRACT — if `$COSMON_ARTIFACT_DIR` is set in your env (it is \
whenever a tenant tackled this molecule through the RPP API), copy your \
single canonical deliverable there as `result.md` (or, if the \
deliverable is genuinely binary, under its natural filename). This is \
the one file the tenant retrieves via `GET /v1/molecules/{id}/result`. \
The worktree is yours to think in; the artifact dir is the delivery \
window. Skip this only when the molecule produces no single canonical \
output (then the tenant enumerates `GET .../artifacts` instead). \
Reference: task-20260605-f46c (tackled-output restitution contract).
"""
needs = ["implement"]
acceptance = "cargo check + test + clippy + fmt + doc all pass"
