\* Model 4 — Minimal trace producing the I9 Gödel counterexample.
\* One molecule is enough; we constrain MaxSeqno to 1 to keep TLC
\* output compact.
\* Expected: TLC reports an invariant violation on I9 with a 2-step
\* trace: Init -> BypassMerge(m1) -> branch_merged[m1] = TRUE while
\* mol_status[m1] = "Absent". This is the smallest possible witness
\* of "merger touched a field outside the writer-lock domain".
SPECIFICATION Spec
CONSTANTS
    Mol = {m1}
    MaxSeqno = 1
    AsyncCrashesEnabled = FALSE
    OutOfBandEnabled    = TRUE
    T_STALL  = 99
    MaxClock = 1
INVARIANTS
    I9_BranchMergedOnlyIfCompleted
