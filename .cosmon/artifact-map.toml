# Cosmon artifact map — declares what each tracked file is and who it is for.
#
# THE MECHANISM (genre → audience → residence)
# --------------------------------------------
# Each `[genre]` table below names a set of path globs (`location`) and an
# `audience`. A file's genre is decided by matching its path against these
# globs; its genre fixes its audience; its audience fixes where it is allowed
# to live (its "residence"). Since the ONE-REPO model switch (ADR-133,
# 2026-06-24) cosmon uses exactly TWO audiences:
#   public → a fresh public clone of `main` sees these (the default for this repo)
#   solo   → regenerable / local-only state, NEVER tracked, NEVER pushed
# This collapses ADR-057's five-audience scheme (public/team/author+agent/
# partner/solo). `team`, `author+agent` and `partner:<name>` are retired:
# cosmon is now ONE public repo, not a maintained public/private pair, so there
# is no orphan `narration` branch and no private projection to host them.
#
# THE AUDIT GATE (scripts/artifact-map-audit.py) turns the build red if ANY
# tracked file classifies as a non-public audience. Two ways that happens:
#   1. a path matches a `solo` genre below while being tracked — a regenerable
#      or local-only artifact that leaked into the index (a tree-hygiene bug),
#   2. (forward-looking) a future confidential genre mapped to `solo`.
# The goal state is: EVERY tracked file classifies `public`. Anything that
# classifies `solo` while tracked is a bug to surface — it should be
# `git rm --cached`'d and gitignored, not shipped. (Confidential *strings*
# embedded inside otherwise-public files — client names, operator $PATH, API
# keys — are caught by a SEPARATE gate: gitleaks + the forbid-strings scan in
# scripts/release-checklist.sh, and the D7 publish gate in `cs done`, ADR-128.
# Residence answers "whole file"; the string gate answers "inside the file".)
#
# ORDERING CONTRACT (invariant I2 — deterministic classification): on a
# multi-match the more specific glob wins — descending by number of fixed
# (non-wildcard) leading path components. Ties resolve in declaration order.
# The `code` catch-all `**/*` is LAST so that every tracked path classifies
# (invariant I1 — totality).
#
# Cross-reference: ADR-133 (one-repo membrane), oxymake ADR-017 (the source
# topology), ADR-057 (the original genre axis this supersedes the audiences of),
# ADR-055 (residence), ADR-128 (D7 publish gate).

# =====================================================================
# SOLO — regenerable / local-only. MUST NOT be tracked. A tracked match
# here is a tree-hygiene leak the audit flags RED. Declared first so the
# fixed-prefix specificity beats the `**/*` catch-all; order among solo
# genres is irrelevant (no overlaps).
# =====================================================================

# Runtime ledger + per-molecule state. Already gitignored (.gitignore:
# `.cosmon/state/`). Declared so that if the ignore is ever bypassed
# (`git add -f`, a stray tool), the leak surfaces here.
[cosmon-runtime-state]
location = [".cosmon/state/**/*", ".cosmon/events.jsonl"]
audience = "solo"

# Regenerable GitHub/ledger surface mirrors. `cs reconcile` rewrites them on
# every sync (ADR-057 §2.5). Gitignored at the repo root; a public clone
# regenerates them against its own (empty) state.
[github-surface]
location = ["STATUS.md", "ISSUES.md", "IDEAS.md", "DELIBERATIONS.md", "docs/surfaces/**/*"]
audience = "solo"

# cargo-mutants output — regenerated by `cargo mutants`. Local-only by nature
# (carries absolute $PATH in its logs). Tracked copies are an accident.
[mutation-output]
location = ["mutants.out/**/*", "mutants.out.old/**/*"]
audience = "solo"

# Smoke / demo rehearsal scratch. Most are already gitignored
# (.addl-rehearsal/, .ilb-rehearsal/, .ilb-video-demo/); any tracked file is a
# pre-ignore residue. See docs/guides/scratch-convention.md.
[rehearsal-scratch]
location = [".addl-rehearsal/**/*", ".ilb-rehearsal/**/*", ".ilb-video-demo/**/*"]
audience = "solo"

# Local tool caches (wrangler account cache carries the Cloudflare account id +
# operator email). Never source, never shipped.
[tool-cache]
location = [".wrangler/**/*"]
audience = "solo"

# Retired deny-by-default membrane machinery (ADR-127, superseded by ADR-133).
# The allowlist enumerates the entire shipping frontier with clearance
# rationale; release-rules carries confidential client/domain literals. Both
# are operator artifacts that can NEVER ship under the one-repo model — they
# are private inputs to the LOCAL detectors, not public manifests.
[release-membrane-private]
location = [".cosmon/release-allowlist.toml", ".cosmon/release-rules.toml"]
audience = "solo"

# =====================================================================
# PUBLIC — ships on a fresh clone of `main`. Specific genres first so the
# audit's per-genre census is legible; all of them resolve to `public`.
# =====================================================================

# The Rust workspace: source, tests, benches, manifests, lockfile, toolchain.
[manifest]
location = ["Cargo.toml", "Cargo.lock", "crates/**/Cargo.toml", "rust-toolchain.toml"]
audience = "public"

[crate-source]
location = ["crates/**/src/**/*", "crates/**/tests/**/*", "crates/**/benches/**/*", "crates/**/build.rs"]
audience = "public"

# Native pilot apps (Swift/CosmonKit), xtask helpers, dev tools — host-side source.
[app-source]
location = ["apps/**/*", "xtask/**/*", "tools/**/*"]
audience = "public"

# Architecture decision records.
[adr]
location = ["docs/adr/**/*"]
audience = "public"

# Narrative memory. Reclassified author+agent → public by the one-repo switch
# (ADR-133): chronicles are part of cosmon's public story. NOTE: any chronicle
# still carrying private tokens is a forbid-strings blocker, not a residence
# leak — see scripts/release-checklist.sh.
[chronicle]
location = ["docs/lore/**/*"]
audience = "public"

# The pre-print / book / handbook and every other doc not carved out above.
[docs]
location = ["docs/**/*", "THESIS.md", "README.md", "CHANGELOG.md", "CONTRIBUTING.md", "CONSTITUTION.md", "AGENTS.md", "CLAUDE.md"]
audience = "public"

# CI, packaging, distribution, formal specs, supply-chain audit config.
[ci-and-packaging]
location = [".github/**/*", "packaging/**/*", "dist/**/*", "docker/**/*", "specs/**/*", "supply-chain/**/*", "deny.toml"]
audience = "public"

# Release + ops scripts. Public by decision (the checklist ships). The
# confidential denylist these scripts consume is sourced EXTERNALLY at runtime
# (env / gitignored local file / the solo release-rules.toml), never inlined —
# so the script can ship without re-leaking what it forbids (ADR-127 §6 lesson,
# carried into ADR-133).
[scripts]
location = ["scripts/**/*", "justfile", "hooks/**/*", "lefthook.yml"]
audience = "public"

# =====================================================================
# Catch-all — MUST stay last (invariant I1 — totality). Everything not carved
# out above: LICENSE files, .gitignore, dotfiles, root configs, templates,
# examples, evidence, theater demos, etc. Public by default.
# =====================================================================
[code]
location = ["**/*"]
audience = "public"
