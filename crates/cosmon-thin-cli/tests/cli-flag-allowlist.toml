# bypass-seal). cs-thin does not surface tackle at all (operator_only,
# ADR-080 §5.1) — these flags are only listed for completeness because
# `verb_absent_from_thin` does not gate per-flag.
# ─────────────────────────────────────────────────────────────────────

[[flag_only_in_cs]]
verb = "tackle"
flag = "--adapter"
reason = "adapter selector — local fleet plumbing; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--by"
reason = "anti-preemption lease owner (human | runtime:<pid>, task-20260531-a12f) — local-dispatch plumbing. Over RPP the dispatcher identity IS the JWT sub, so --by is intentionally cs-only."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--bypass-reason"
reason = "bypass-seal audit field — local merge-gate plumbing; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--bypass-seal"
reason = "merge-gate bypass switch (operator-only) — local; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--dry-run"
reason = "tackle dry-run preview — local; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--fallback-from-local"
reason = "Q5b loud-fallback opt-in (task-20260530-c089) — mints the local_fallback + remote_egress_opt_in atom at local spawn; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--fleet"
reason = "fleet selector — local concern; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--force"
reason = "force-retackle override — local; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--model"
reason = "per-molecule model pin (delib-20260704-b476 C1) — sibling of --adapter, resolved at the local spawn boundary; cs-thin never tackles. Over RPP the model is a server/formula concern, not a tenant flag."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--name"
reason = "worker name override — local fleet concern; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--no-worktree"
reason = "worktree suppression — local plumbing; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--permission-mode"
reason = "claude-code permission-mode passthrough — local plumbing; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--role-hint"
reason = "worker role hint — local fleet concern; cs-thin never tackles."

[[flag_only_in_cs]]
verb = "tackle"
flag = "--workdir"
reason = "worktree workdir override — local plumbing; cs-thin never tackles."

# ─────────────────────────────────────────────────────────────────────
# freeze — cs has --by, --no-tmux, --timeout (worker-process plumbing);
# cs-thin only mirrors the rpp-adapter freeze contract.
# ─────────────────────────────────────────────────────────────────────

[[flag_only_in_cs]]
verb = "freeze"
flag = "--by"
reason = "freeze attribution — local concern; rpp-adapter records the principal from the JWT."

[[flag_only_in_cs]]
verb = "freeze"
flag = "--no-tmux"
reason = "tmux suppression flag — local worker plumbing."

[[flag_only_in_cs]]
verb = "freeze"
flag = "--timeout"
reason = "freeze timeout — local worker plumbing."

# ─────────────────────────────────────────────────────────────────────
# thaw — cs has --continue, --no-tmux (worker-process plumbing).
# ─────────────────────────────────────────────────────────────────────

[[flag_only_in_cs]]
verb = "thaw"
flag = "--continue"
reason = "continue-after-thaw flag — local worker plumbing."

[[flag_only_in_cs]]
verb = "thaw"
flag = "--no-tmux"
reason = "tmux suppression flag — local worker plumbing."

# ─────────────────────────────────────────────────────────────────────
# stuck / tag — surfaces are tight; only globals diverge (handled at
# `verb = "*"`).
# ─────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────
# cs-thin globals absent from cs.
# ─────────────────────────────────────────────────────────────────────

[[flag_only_in_thin]]
verb = "*"
flag = "--base-url"
reason = "cs-thin needs an HTTP target; cs has direct disk access."

[[flag_only_in_thin]]
verb = "*"
flag = "--jwt-from-env"
reason = "cs-thin reads bearer JWTs from env; cs is local-only."

[[flag_only_in_thin]]
verb = "*"
flag = "--jwt-file"
reason = "cs-thin alternative to --jwt-from-env; cs has no JWT concept."

[[flag_only_in_thin]]
verb = "*"
flag = "--coverage-report"
reason = "cs-thin self-description rapport — has no cs equivalent."
