# ─────────────────────────────────────────────────────────────────────
# Per-verb flag asymmetries.
# ─────────────────────────────────────────────────────────────────────
#
# `flag_only_in_cs` lists every flag present in `cs <verb>` (or cs
# globally with verb="*") that cs-thin intentionally does not surface.
# `flag_only_in_thin` lists the symmetric case. Both sides are
# necessary — without them the test would either over- or under-fail.

# Global cs flags absent from cs-thin globals.
[[flag_only_in_cs]]
verb = "*"
flag = "--config"
reason = "cs-thin is stateless — no config file path to honour."

[[flag_only_in_cs]]
verb = "*"
flag = "--verbose"
reason = "cs-thin uses tracing env vars (RUST_LOG); no -v switch needed."

# `--json` is cs's opt-in for JSON output; cs-thin emits JSON natively
# for every dispatch verb. The flag is accepted as a no-op at the
# global Cli level so habit-typing doesn't error out (operator_ux.rs
# pins this behaviour); per-verb help still does not surface it.
# (This is allowlisted at "*" level because cs injects --json into
# every per-verb help via its global Args.)
[[flag_only_in_cs]]
verb = "*"
flag = "--json"
reason = "cs-thin is JSON-native for dispatch verbs; --json is a no-op at top level."

