\* TLC model — widened safety-only config for CosmonDocHarness.
\*
\* Stress-test safety invariants (TypeOK, NoOrphanDoc, DemoGateBeforeDoc,
\* RegistryTruth, TatouageShape) on a larger state space. No liveness,
\* no fairness — SYMMETRY collapses the ArtifactIds + Adapters orbits.
\*
\* Launch:
\*   $JAVA -XX:+UseParallelGC -jar tla2tools.jar \
\*       -workers auto -config CosmonDocHarness_Safety.cfg CosmonDocHarness.tla
\*
\* Expected verdict: "Model checking completed. No error has been found."

SPECIFICATION Spec

CONSTANTS
    ArtifactIds      = { a1, a2, a3 }
    Adapters         = { ad_legit, ad_bait }
    RegistryAdapters = { ad_legit }
    KebabRenameBait  = { ad_bait }
    Concepts         = { c1 }
    MaxIter          = 12
    MaxArtifacts     = 20
    MaxWordCount     = 20

SYMMETRY Symmetry

INVARIANTS
    TypeOK
    NoOrphanDoc
    DemoGateBeforeDoc
    RegistryTruth
    TatouageShape

CHECK_DEADLOCK FALSE
