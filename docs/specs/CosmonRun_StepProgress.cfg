\* Model 7 — StepProgress (the 8th clock; knuth I_StepProgress).
\*
\* Exercises the inference-stall invariant introduced 2026-04-20 in
\* response to fixture idea-20260419-2d4e (the 4-hour silent molecule).
\*
\* Expected outcome: every safety invariant holds AND I_StepProgress
\* holds. Under `T_STALL = 3 < MaxClock = 6`, TLC explores traces
\* where `now` advances, Silence(m) crosses T_STALL, and weak fairness
\* on MarkStalled forces the transition Running → Stalled. It also
\* explores traces where Evolve keeps firing and Silence stays small
\* (normal progress, no stall) and traces where the operator Collapses
\* or Freezes before the observer marks stalled. All three consequents
\* are legitimate resolutions of the stall precondition.
\*
\* With WF on MarkStalled removed the property fails — this is the
\* ADR-052 "starvation" shape knuth §4 predicted and is the canonical
\* reason I_StepProgress is liveness, not safety.
\*
\* One molecule + MaxSeqno = 1 keeps the state space tight; the
\* invariant does not need multiple molecules to manifest.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    Mol = {m1}
    MaxSeqno = 1
    AsyncCrashesEnabled = FALSE
    OutOfBandEnabled    = FALSE
    T_STALL  = 3
    MaxClock = 6
INVARIANTS
    TypeOK
    I6_NoGhostFleetEntry
    I7_SingleEventWriter
    I9_BranchMergedOnlyIfCompleted
PROPERTIES
    I_StepProgress
    L3_LockEventuallyReleased
