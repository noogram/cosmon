# Absorbed from foundry colony (2026-04-13).
# Chronicle observation layer — fold over drained DAG artifacts.
# Design B: single observer (blob chronicler).

formula = "mycelium"
version = 1
description = "Chronicle observation layer — fold over drained DAG artifacts"
id_prefix = "mycelium"

[[steps]]
id = "germinate"
title = "Survey the drained DAG"
description = """Survey the drained DAG (cs deps <mission> --transitive), list all completed
molecules with their artifact paths. Write mycelium-plan.md listing traversal
order + artifact inventory."""
acceptance = "mycelium-plan.md exists with molecule inventory and traversal order"

[[steps]]
id = "inoculate"
title = "Inoculate — single hypha fold"
description = """The single hypha reads ALL completed molecule artifacts (briefing.md, log.md,
synthesis.md, responses/) + the current CHRONICLES.md. Produces 0-3 chronicle
entries appended to docs/lore/CHRONICLES.md. Follows chronicle criteria:
illuminates a principle, not routine. Commits.

Fold interface: (accumulated_chronicles, molecule_artifacts) → updated_chronicles
Phase 1 invokes it once. Phase 2 will factor into N sequential invocations."""
needs = ["germinate"]
acceptance = "CHRONICLES.md updated (or unchanged if nothing merits a chronicle entry), committed"
