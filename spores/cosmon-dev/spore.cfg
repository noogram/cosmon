\* ==========================================================================
\* spore.cfg — TLC model for spore.tla (the cosmon-dev seal).
\*
\* LAUNCH (from inside spores/cosmon-dev/, any Java 11+ on PATH). The jar ships
\* in the cosmon repo at docs/specs/tla2tools.jar — point TLA2TOOLS_JAR at it:
\*   export TLA2TOOLS_JAR=../../docs/specs/tla2tools.jar
\*   java -XX:+UseParallelGC -cp "$TLA2TOOLS_JAR" tlc2.TLC \
\*        -workers auto -config spore.cfg spore.tla
\*
\* EXPECTED VERDICT: "Model checking completed. No error has been found."
\*
\* MODEL SIZE (rationale):
\*   - MaxRounds = 3: the SMALLEST bound that exercises the convergence loop as a
\*     real machine — round 1 (not-clean), round 2 (not-clean), round 3 (the
\*     MaxRounds exhaustion => converge BLOCKED), AND the clean-fixpoint reachable
\*     at any round. A bound of 1 would collapse the loop; 3 gives the exhaustion
\*     path AND the fixpoint path distinct depths. The real default (max_rounds=5)
\*     is a strictly larger bound with the same structure: Termination holds a
\*     fortiori because the loop variant only grows the cap, never the topology.
\*
\* No SYMMETRY: Termination is a liveness property and TLC refuses symmetry on
\* temporal properties.
\*
\* CHECK_DEADLOCK FALSE: a fully-drained DAG (every node Done, or converge Blocked
\* at exhaustion) is the intended terminal absorbing state, not a deadlock bug.
\* Termination is checked as the liveness PROPERTY instead.
\* ==========================================================================

SPECIFICATION Spec

CONSTANTS
    MaxRounds = 3

INVARIANT
    SealInvariant

PROPERTY
    Termination

CHECK_DEADLOCK FALSE
