# Pinned toolchain for the cosmon workspace.
#
# `channel = "stable"` intentionally tracks the latest stable — combined
# with `rust-version = "1.88"` in the root Cargo.toml, the MSRV floor is
# enforced while day-to-day builds pick up patch fixes from stable.
#
# MSRV bumped 1.82 → 1.88 on 2026-04-22 (ADR-065) to unlock matrix-sdk
# 0.16 (requires rustc 1.88 + edition 2024).
#
# Components are the minimum needed to run the DoD gates:
#   cargo fmt --all -- --check           (rustfmt)
#   cargo clippy --workspace -- -D warnings  (clippy)
#
# `cargo check` / `cargo test` / `cargo build` use the base toolchain.

[toolchain]
channel = "stable"
components = ["rustfmt", "clippy"]
profile = "minimal"
