formula = "citation-audit"
version = 1
description = "Audit citations in a mathematical artefact (L0/L1/L2/L3 protocol)"
id_prefix = "cite"

# Tier 0 — leaf formula, no child nucleation.
[tier]
level = 0

[[steps]]
id = "parse"
title = "Parse citations + locators"
description = """
Extract every `\\cite{...}` (LaTeX) and `[text](url)` (markdown) entry \
from the target artefact. Capture citekey, locator (page / prop / §), \
and surrounding claim sentence. Emit `citations.json` under \
`ops/audits/<molecule_id>/citations.json`.
"""
acceptance = "citations.json emitted listing every \\cite with (citekey, locator, claim_context)"

[[steps]]
id = "resolve"
title = "Run L0/L1/L2 protocol per citation"
description = """
For each citation in `citations.json`, invoke the `citation-auditor` \
agent with the L0/L1/L2 protocol (git-blame provenance → Zotero \
human-audit → PDF-MCP verbatim match). Produce a verdict (tier, \
confidence, evidence) per entry. L1 dominates L2 — if L1 decides, \
short-circuit. Output: `ops/audits/<molecule_id>/verification-report.md`.
"""
needs = ["parse"]
acceptance = "verification-report.md emitted with (tier, confidence, evidence) per entry"

[[steps]]
id = "escalate"
title = "File escalations for L3 / L2_weak"
description = """
Entries with tier `L3` or `L2_weak` require human review. Append \
one escalation row per such entry to `ops/escalations.md` (target, \
citekey, locator, tier, reason, proposed action). If no escalations, \
record an empty-delta note.
"""
needs = ["resolve"]
acceptance = "ops/escalations.md updated OR empty-delta noted"
