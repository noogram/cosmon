[package]
name = "cosmon-transport"
publish.workspace = true
version = "0.1.0"
edition = "2021"
rust-version.workspace = true
# Frontier crate (ADR-092): a third party would `cargo add` this without
# wanting AGPL â€” keep on Apache-2.0 to preserve permissive boundary.
license = "AGPL-3.0-only"
description = "Transport backend adapters for Cosmon (tmux, mock)"

[features]
integration = []
test-support = []

[dependencies]
blake3.workspace = true
chrono.workspace = true
cosmon-bridge-claude.workspace = true
# `test-harness` exposes cosmon_core::harness, which holds the *production*
# `CommandRunner` / `CommandOutput` / `CommandRunnerError` ports this crate's
# RealCommandRunner implements at production scope (not just the test mocks).
# Commit 494999bd4 (minimize core public API) gated the whole module behind
# this feature, breaking the workspace build fleet-wide. Stop-gap unblock
# mirroring cosmon-runtime; the proper fix is to split the production ports
# out of the test-gated `harness` module (task-20260622-da94 seam-lifting).
# Surfaced cosmon-ward in molecule task-20260623-a2db outcomes.
cosmon-core = { workspace = true, features = ["test-harness"] }
# `nix` supplies `Uid::effective().is_root()` for the headless claude spawn
# path (`claude.rs`): Claude Code v2.x refuses a bypass permission mode under
# euid 0 unless `IS_SANDBOX=1` is set (BUG #6.2). `user` is the feature that
# exposes `unistd::Uid`; the workspace pin already enables it.
nix.workspace = true
cosmon-state.workspace = true
serde.workspace = true
thiserror.workspace = true
toml.workspace = true
toml_edit.workspace = true
fs2.workspace = true
# `tempfile` creates the headless-claude worker briefing atomically with an
# unpredictable name and mode 0600 (`O_CREAT|O_EXCL`), replacing the earlier
# predictable `/tmp/cosmon-briefing-<session>-<pid>.txt` written world-readable
# with `std::fs::write` â€” a TOCTOU / arbitrary-overwrite vector plus a
# confidentiality leak of the operator's private briefing (task-20260721-7a68
# security review of `claude.rs`). Promoted from dev-dependencies for the
# production spawn path.
tempfile.workspace = true
# Logging facade only â€” a no-op when no subscriber is installed, so the
# frontier `cargo add cosmon-transport` cost is one lightweight dep. The
# hosts that actually run this backend (cosmon-daemon, cosmon-rpp-adapter)
# already install a `tracing-subscriber`, so submit-budget-exhaustion events
# emitted from `send_input` surface there. Declared directly (not via
# workspace deps) to match the existing in-repo convention for `tracing`.
tracing = "0.1"

[lints]
workspace = true
