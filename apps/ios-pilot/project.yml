name: ios-pilot
options:
  bundleIdPrefix: dev.noogram.cosmon
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ios-pilot:
    type: application
    platform: iOS
    scheme:
      testTargets: []
      gatherCoverageData: false
    sources:
      - path: ios-pilot
        excludes:
          # MotionView references model types (MotionSnapshot, MotionWorker,
          # MotionMolecule, ...) and an API method (`CosmonAPIProtocol.motion`)
          # that were never landed in ios-pilot. The file is an orphan — no
          # other view or entry point references `MotionView` or `MotionStore`.
          # Exclude it so the app builds clean; a follow-up bead (temp:warm)
          # must either port the missing types + API from mac-pilot or delete
          # this file. Excluding here keeps the worktree honest:
          # `xcodebuild` → succeeds; the unfinished feature is not silently
          # shipped in a broken state.
          - MotionView.swift
    info:
      path: ios-pilot/Info.plist
      properties:
        CFBundleDisplayName: Cosmon
        CFBundleShortVersionString: "0.1.0"
        LSApplicationCategoryType: public.app-category.productivity
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiredDeviceCapabilities:
          - arm64
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.noogram.cosmon.ios-pilot
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 69Y2Z265F9
