\* Model 1 — In-band only (no async crashes, no out-of-band merge).
\* Expected: every safety invariant holds; every liveness property holds.
\* This is the "closed environment" case where the cosmon CLI is the
\* sole writer of every field.
SPECIFICATION Spec
CHECK_DEADLOCK FALSE
CONSTANTS
    Mol = {m1, m2, m3}
    MaxSeqno = 2
    AsyncCrashesEnabled = FALSE
    OutOfBandEnabled    = FALSE
    \* StepProgress machinery dormant in pre-2026-04-20 configs:
    \* T_STALL >> MaxClock ⇒ Silence(m) can never exceed T_STALL
    \* ⇒ MarkStalled never enabled ⇒ semantics unchanged.
    T_STALL  = 99
    MaxClock = 1
INVARIANTS
    TypeOK
    I3_FleetMirrorsSession
    I4_SessionImpliesLiveProcess
    I6_NoGhostFleetEntry
    I7_SingleEventWriter
    I9_BranchMergedOnlyIfCompleted
PROPERTIES
    I5_CompletedEventuallyMerges
    L3_LockEventuallyReleased
